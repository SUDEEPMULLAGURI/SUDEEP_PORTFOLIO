<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Sudeep Mullaguri</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- EasyMDE for Markdown Editing -->
    <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
    <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    <style>
        :root {
            --primary-blue: #0066FF;
            --dark-blue: #003399;
            --light-blue: #E6F0FF;
            --bg-body: #F7FAFC;
            --white: #FFFFFF;
            --text-main: #1A202C;
            --text-secondary: #4A5568;
            --error: #E53E3E;
            --success: #38A169;
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-main); background: var(--bg-body); color: var(--text-main); }
        
        .header {
            background: var(--white);
            padding: 1rem 2rem;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.5rem; color: var(--dark-blue); }
        
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #E2E8F0;
            margin-bottom: 2rem;
        }

        /* Forms */
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #CBD5E0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px var(--light-blue); }
        
        .btn {
            background: var(--primary-blue);
            color: var(--white);
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn:hover { background: var(--dark-blue); }
        .btn:disabled { background: #A0AEC0; cursor: not-allowed; }
        .btn-outline { background: transparent; color: var(--primary-blue); border: 1px solid var(--primary-blue); }
        .btn-outline:hover { background: var(--light-blue); }
        .btn-danger { background: var(--error); }
        .btn-danger:hover { background: #C53030; }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            display: none;
        }
        .alert-error { background: #FED7D7; color: #9B2C2C; border: 1px solid #FEB2B2; }
        .alert-success { background: #C6F6D5; color: #22543D; border: 1px solid #9AE6B4; }

        /* Panels */
        #auth-panel { display: block; }
        #editor-panel { display: none; }
        
        .token-help { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; }
        .token-help a { color: var(--primary-blue); text-decoration: none; }

        .editor-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }

    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-terminal"></i> Static CMS</h1>
        <a href="index.html" class="btn btn-outline" style="padding: 0.4rem 1rem; font-size: 0.9rem;">Back to Site</a>
    </div>

    <div class="container">
        
        <div id="alert-box" class="alert"></div>

        <!-- AUTH PANEL -->
        <div id="auth-panel" class="card">
            <h2 style="margin-bottom: 1rem;">Authentication</h2>
            <p style="margin-bottom: 2rem; color: var(--text-secondary);">Connect to GitHub to manage your blog posts.</p>
            
            <div class="form-group">
                <label for="gh-token">GitHub Personal Access Token (Classic)</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxx">
                <div class="token-help">
                    Requires `repo` scope. <a href="https://github.com/settings/tokens/new" target="_blank">Generate a token</a>
                </div>
            </div>
            
            <button id="btn-login" class="btn">Connect Dashboard</button>
        </div>

        <!-- EDITOR PANEL -->
        <div id="editor-panel">
            <div class="editor-header">
                <h2>Write New Post</h2>
                <button id="btn-logout" class="btn btn-outline btn-danger"><i class="fas fa-sign-out-alt"></i> Disconnect</button>
            </div>
            
            <div class="card">
                <div class="form-group">
                    <label for="post-title">Post Title</label>
                    <input type="text" id="post-title" placeholder="E.g., Getting Started with ESP32">
                </div>
                
                <div class="form-group">
                    <label for="post-summary">Summary (Short Excerpt)</label>
                    <input type="text" id="post-summary" placeholder="A brief overview of the post...">
                </div>
                
                <div class="form-group">
                    <label>Markdown Content</label>
                    <textarea id="post-content"></textarea>
                </div>
                
                <div style="text-align: right; margin-top: 2rem;">
                    <button id="btn-publish" class="btn"><i class="fas fa-paper-plane"></i> Publish to GitHub</button>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
